name: Deploy Frontend to cPanel

on:
  push:
    branches: [ master ]
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Update build version
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|export const BUILD_DATE = '.*';|export const BUILD_DATE = '${BUILD_DATE}';|" src/environments/version.ts
        working-directory: frontend

      - name: Build Angular
        run: npm run build -- --configuration production --base-href /erp/
        working-directory: frontend

      - name: Deploy via FTP to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/dist/erp-frontend/
          server-dir: /public_html/erp/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
